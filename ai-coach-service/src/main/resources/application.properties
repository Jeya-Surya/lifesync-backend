server.port=8085
spring.application.name=ai-coach-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

jwt.secret=LifeSyncSuperSecretKeyForJWTTokenGenerationAndValidation2024!

# Groq API config
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Internal service URLs (via Eureka service names)
services.goal-service.url=http://goal-service
services.habit-service.url=http://habit-service
services.job-service.url=http://job-tracker-service

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never