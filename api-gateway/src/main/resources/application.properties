# Server
server.port=8080

# Application
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===================================================
# ROUTES — this is the core of the API Gateway
# ===================================================

# Route 1: user-service
# Any request to /api/auth/** or /api/users/** goes to user-service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

# Route 2: goal-service
spring.cloud.gateway.routes[1].id=goal-service
spring.cloud.gateway.routes[1].uri=lb://goal-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/goals/**

# Route 3: habit-service
spring.cloud.gateway.routes[2].id=habit-service
spring.cloud.gateway.routes[2].uri=lb://habit-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/habits/**

# Route 4: job-tracker-service
spring.cloud.gateway.routes[3].id=job-tracker-service
spring.cloud.gateway.routes[3].uri=lb://job-tracker-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/jobs/**

# Route 5: ai-coach-service
spring.cloud.gateway.routes[4].id=ai-coach-service
spring.cloud.gateway.routes[4].uri=lb://ai-coach-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/coach/**

# Logging (useful for debugging route issues)
logging.level.org.springframework.cloud.gateway=DEBUG